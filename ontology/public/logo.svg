<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28" fill="none">
  <defs>
    <linearGradient id="brand-gradient" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- 3 connecting edges (triangle) -->
  <line x1="14" y1="5.5" x2="5.5" y2="21" stroke="url(#brand-gradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="5.5" x2="22.5" y2="21" stroke="url(#brand-gradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="5.5" y1="21" x2="22.5" y2="21" stroke="url(#brand-gradient)" stroke-width="2" stroke-linecap="round"/>
  <!-- Node A (top) -->
  <circle cx="14" cy="5.5" r="3.5" fill="url(#brand-gradient)"/>
  <!-- Node B (bottom-left, slightly larger to hint hierarchy) -->
  <circle cx="5.5" cy="21" r="4" fill="url(#brand-gradient)"/>
  <!-- Node C (bottom-right) -->
  <circle cx="22.5" cy="21" r="3.5" fill="url(#brand-gradient)"/>
</svg>
